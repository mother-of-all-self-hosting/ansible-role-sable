---
# Project source code URL: https://github.com/7w1/sable

sable_enabled: true

sable_identifier: sable
sable_base_path: "/{{ sable_identifier }}"
sable_config_path: "{{ sable_base_path }}/config"

# renovate: datasource=docker depName=ghcr.io/7w1/sable
sable_version: 1.6.0

sable_uid: ""
sable_gid: ""

# The scheme used for serving Sable.
sable_scheme: https

# The hostname at which Sable is served.
sable_hostname: ""

# The path at which Sable is served.
# This value must either be `/` or not end with a slash (e.g. `/sable`).
#
# Hosting Sable under a subpath does not seem to be possible due to Sable's
# technical limitations.
sable_path_prefix: /

sable_container_image: "{{ sable_container_image_registry_prefix }}sableclient/sable:{{ sable_container_image_tag }}"
sable_container_image_tag: "{{ sable_version }}"
sable_container_image_registry_prefix: "{{ sable_container_image_registry_prefix_upstream }}"
sable_container_image_registry_prefix_upstream: "{{ sable_container_image_registry_prefix_upstream_default }}"
sable_container_image_registry_prefix_upstream_default: ghcr.io/
sable_container_image_force_pull: "{{ sable_container_image.endswith(':latest') }}"

sable_container_image_self_build: false
sable_container_image_self_build_name: "7w1/sable:{{ sable_container_image_self_build_repo_version }}"
sable_container_image_self_build_repo: "https://github.com/SableClient/Sable.git"
sable_container_image_self_build_repo_version: "{{ sable_version if sable_version != 'latest' else 'main' }}"
sable_container_image_self_build_src_files_path: "{{ sable_base_path }}/docker-src"

# The base container network. It will be auto-created by this role if it doesn't exist already.
sable_container_network: "{{ sable_identifier }}"

# Control if the container network is deleted on uninstalling.
sable_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `sable_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
sable_container_http_host_bind_port: ""

# The port number in the container
sable_container_http_port: 8080

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
sable_container_additional_networks: "{{ sable_container_additional_networks_auto + sable_container_additional_networks_custom }}"
sable_container_additional_networks_auto: []
sable_container_additional_networks_custom: []

# A list of additional "volumes" to mount in the container.
# This list gets populated dynamically at runtime. You can provide a different default value,
# if you wish to mount your own files into the container.
# Contains definition objects like this: `{"type": "bind", "src": "/outside", "dst": "/inside", "options": "readonly"}.
# See the `--mount` documentation for the `docker run` command.
sable_container_additional_volumes: "{{ sable_container_additional_volumes_auto + sable_container_additional_volumes_custom }}"
sable_container_additional_volumes_auto: []
sable_container_additional_volumes_custom: []

# sable_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `sable_container_labels_additional_labels_custom`.
sable_container_labels_traefik_enabled: true
sable_container_labels_traefik_docker_network: "{{ sable_container_network }}"
sable_container_labels_traefik_hostname: "{{ sable_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/sable`).
sable_container_labels_traefik_path_prefix: "{{ sable_path_prefix }}"
sable_container_labels_traefik_rule: "Host(`{{ sable_container_labels_traefik_hostname }}`){% if sable_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ sable_container_labels_traefik_path_prefix }}`){% endif %}"
sable_container_labels_traefik_priority: 0
sable_container_labels_traefik_entrypoints: web-secure
sable_container_labels_traefik_tls: "{{ sable_container_labels_traefik_entrypoints != 'web' }}"
sable_container_labels_traefik_tls_certResolver: default  # noqa var-naming

# Controls whether a compression middleware will be injected into the middlewares list.
# This compression middleware is supposed to be defined elsewhere (using labels or a File provider, etc.) and is merely referenced by this router.
sable_container_labels_traefik_compression_middleware_enabled: false
sable_container_labels_traefik_compression_middleware_name: ""

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `sable_container_labels_traefik_additional_request_headers_custom`
sable_container_labels_traefik_additional_request_headers: "{{ sable_container_labels_traefik_additional_request_headers_auto | combine(sable_container_labels_traefik_additional_request_headers_custom) }}"
sable_container_labels_traefik_additional_request_headers_auto: {}
sable_container_labels_traefik_additional_request_headers_custom: {}

# Specify the size of the container's /tmp tmpfs volume
sable_container_tmpfs_tmp_size: 10m

# Specify the size of the container's /data tmpfs volume (used by Caddy for runtime state)
sable_container_tmpfs_data_size: 10m

# Specify the size of the container's /config tmpfs volume (used by Caddy for config state)
sable_container_tmpfs_config_size: 10m

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `sable_container_labels_traefik_additional_response_headers_custom`
sable_container_labels_traefik_additional_response_headers: "{{ sable_container_labels_traefik_additional_response_headers_auto | combine(sable_container_labels_traefik_additional_response_headers_custom) }}"
sable_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': sable_http_header_xss_protection} if sable_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': sable_http_header_content_type_options} if sable_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': sable_http_header_content_security_policy} if sable_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': sable_http_header_permissions_policy} if sable_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': sable_http_header_strict_transport_security} if sable_http_header_strict_transport_security and sable_container_labels_traefik_tls else {})
  }}
sable_container_labels_traefik_additional_response_headers_custom: {}

# sable_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `sable_container_labels_additional_labels_custom`
#
# Example:
# sable_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
sable_container_labels_additional_labels: "{{ sable_container_labels_additional_labels_auto + sable_container_labels_additional_labels_custom }}"
sable_container_labels_additional_labels_auto: []
sable_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
sable_container_extra_arguments: "{{ sable_container_extra_arguments_auto + sable_container_extra_arguments_custom }}"
sable_container_extra_arguments_auto: []
sable_container_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
sable_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
sable_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
sable_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
sable_http_header_permissions_policy: "{{ 'interest-cohort=()' if sable_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
sable_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if sable_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `sable_http_header_permissions_policy`
sable_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `sable_http_header_strict_transport_security`
sable_hsts_preload_enabled: false

# List of systemd services that the Sable systemd service depends on
sable_systemd_required_services_list: "{{ sable_systemd_required_services_list_default + sable_systemd_required_services_list_auto + sable_systemd_required_services_list_custom }}"
sable_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
sable_systemd_required_services_list_auto: []
sable_systemd_required_services_list_custom: []

# List of systemd services that the Sable systemd service wants
sable_systemd_wanted_services_list: "{{ sable_systemd_wanted_services_list_default + sable_systemd_wanted_services_list_auto + sable_systemd_wanted_services_list_custom }}"
sable_systemd_wanted_services_list_default: []
sable_systemd_wanted_services_list_auto: []
sable_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
sable_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
sable_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
sable_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
sable_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ sable_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ sable_container_stop_grace_time_seconds }} {{ sable_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ sable_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ sable_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ sable_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ sable_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ sable_identifier }} after {{ sable_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Default homeserver URL to use in the `config.json` file.
# See `sable_config_homeserverList`.
sable_default_hs_url: ""

# Controls whether the Sable access log is enabled
sable_access_log_enabled: true

# Controls the `defaultHomeserver` value in the `config.json` file.
sable_config_defaultHomeserver: 0  # noqa var-naming

# Controls the `homeserverList` value in the `config.json` file.
sable_config_homeserverList: "{{ [sable_default_hs_url] }}"  # noqa var-naming

# Controls the `allowCustomHomeservers` value in the `config.json` file.
sable_config_allowCustomHomeservers: true  # noqa var-naming

# Controls the `featuredCommunities.spaces` value in the `config.json` file.
sable_config_featuredCommunities_spaces: []  # noqa var-naming

# Controls the `featuredCommunities.rooms` value in the `config.json` file.
sable_config_featuredCommunities_rooms: []  # noqa var-naming

# Controls the `featuredCommunities.servers` value in the `config.json` file.
sable_config_featuredCommunities_servers: ["matrix.org"]  # noqa var-naming

# Controls the `featuredCommunities.openAsDefault` value in the `config.json` file.
sable_config_featuredCommunities_openAsDefault: false  # noqa var-naming

# Default Sable configuration template which covers the generic use case.
# You can customize it by controlling the various variables inside it.
#
# For a more advanced customization, you can extend the default (see `sable_configuration_extension_json`)
# or completely replace this variable with your own template.
#
# The side-effect of this lookup is that Ansible would even parse the JSON for us, returning a dict.
# This is unlike what it does when looking up YAML template files (no automatic parsing there).
sable_configuration_default: "{{ lookup('template', 'templates/config.json.j2', convert_data=False) | from_json }}"

# Your custom JSON configuration for Sable should go to `sable_configuration_extension_json`.
# This configuration extends the default starting configuration (`sable_configuration_default`).
#
# You can override individual variables from the default configuration, or introduce new ones.
#
# If you need something more special, you can take full control by
# completely redefining `sable_configuration_default`.
sable_configuration_extension_json: '{}'

sable_configuration_extension: "{{ sable_configuration_extension_json | from_json if sable_configuration_extension_json | from_json is mapping else {} }}"

# Holds the final Sable configuration (a combination of the default and its extension).
# You most likely don't need to touch this variable. Instead, see `sable_configuration_default`.
sable_configuration: "{{ sable_configuration_default | combine(sable_configuration_extension, recursive=True) }}"

# Specify the timezone
sable_environment_variables_tz: UTC

# Additional environment variables.
sable_environment_variables_additional_variables: ""

# Control if the self-check feature should validate SSL certificates.
sable_self_check_validate_certificates: true

# sable_restart_necessary controls whether the Sable systemd service
# will be restarted (when true) or merely started (when false) by the
# systemd service manager role (when conditional restart is enabled).
#
# This value is automatically computed during installation based on whether
# any configuration files, the systemd service file, or the container image changed.
# The default of `false` means "no restart needed" — appropriate when the role's
# installation tasks haven't run (e.g., due to --tags skipping them).
sable_restart_necessary: false
