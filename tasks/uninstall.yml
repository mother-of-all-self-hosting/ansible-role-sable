---
- name: Check existence of Sable systemd service
  ansible.builtin.stat:
    path: "{{ devture_systemd_docker_base_systemd_path }}/{{ sable_identifier }}.service"
  register: sable_service_stat

- name: Uninstall Sable systemd services and files
  when: sable_service_stat.stat.exists | bool
  block:
    - name: Ensure Sable systemd service is stopped
      ansible.builtin.service:
        name: "{{ sable_identifier }}"
        state: stopped
        enabled: false
        daemon_reload: true

    - name: Ensure Sable systemd service does not exist
      ansible.builtin.file:
        path: "{{ devture_systemd_docker_base_systemd_path }}/{{ sable_identifier }}.service"
        state: absent

    - name: Ensure Sable container network does not exist
      when: sable_container_network_deletion_enabled
      block:
        - name: Ensure Sable container network does not exist via community.docker.docker_network
          when: devture_systemd_docker_base_container_network_creation_method == 'ansible-module'
          community.docker.docker_network:
            name: "{{ sable_container_network }}"
            state: absent
          register: sable_network_deletion_result

        - name: Ensure Sable container network does not exist via ansible.builtin.command
          when: devture_systemd_docker_base_container_network_creation_method == 'command'
          ansible.builtin.command:
            cmd: >-
              {{ devture_systemd_docker_base_host_command_docker }} network rm
              {{ sable_container_network }}
          register: sable_network_deletion_result
          changed_when: sable_container_network in sable_network_deletion_result.stdout

    - name: Ensure Sable path does not exist
      ansible.builtin.file:
        path: "{{ sable_base_path }}"
        state: absent
